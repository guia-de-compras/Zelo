<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zelo</title>
    <!-- NOVO: Favicon gerado direto por código (Vetor SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='25' fill='%231a1a1a'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='%23ff5722' font-family='Arial, sans-serif' font-weight='bold' font-size='65'%3EZ%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="container header-content">
            <div class="logo">Zelo</div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Buscar produtos e ofertas...">
                <button id="search-button"><i class="fa fa-search"></i></button>
            </div>

            <div class="social-media">
                <a href="instagram.com/produtosdazelo" target="_blank" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="LINK TIKTOK AQUI" target="_blank" aria-label="TikTok">
                    <i class="fa-brands fa-tiktok"></i>
                </a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="product-grid" id="product-grid">
            <!-- Os produtos vão aparecer aqui via JavaScript -->
        </div>
        <p id="no-results" style="display: none; text-align: center; color: var(--text-color);">Nenhum produto encontrado.</p>
    </main>

    <!-- NOVO: Rodapé com Aviso Legal de Afiliados -->
    <footer>
        <div class="container footer-content">
            <p>Zelo &copy; 2026. Participamos de programas de afiliados. Ao comprar através dos nossos links, podemos receber uma comissão, sem nenhum custo adicional para você.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
